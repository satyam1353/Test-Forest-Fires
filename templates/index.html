<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FWI Prediction System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #ddd;
        }

        .btn {
            padding: 15px 35px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            background: #ff7e5f;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #feb47b;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔥 Forest Fire Prediction</h1>
    <p>Predict Fire Weather Index using Machine Learning</p>

    <a href="/predict">
        <button class="btn">Start Prediction</button>
    </a>
</div>

</body>
</html>
