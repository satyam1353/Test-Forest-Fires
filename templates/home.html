<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FWI Prediction</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1f4037, #99f2c8);
            font-family: 'Poppins', sans-serif;
        }

        .card {
            border-radius: 12px;
        }

        .title {
            font-weight: 600;
        }

        .btn-custom {
            border-radius: 8px;
            padding: 8px 20px;
            font-weight: 500;
            transition: 0.2s ease;
        }

        .btn-custom:hover {
            transform: translateY(-1px);
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="text-center title mb-4">🔥 FWI Prediction</h2>

                <form action="{{ url_for('predict_datapoint') }}" method="post">

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>Temperature</label>
                            <input type="number" step="any" name="Temperature" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Humidity (RH)</label>
                            <input type="number" step="any" name="RH" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Wind Speed</label>
                            <input type="number" step="any" name="Ws" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Rain</label>
                            <input type="number" step="any" name="Rain" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>FFMC</label>
                            <input type="number" step="any" name="FFMC" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>DMC</label>
                            <input type="number" step="any" name="DMC" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>ISI</label>
                            <input type="number" step="any" name="ISI" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Classes</label>
                            <input type="number" step="any" name="Classes" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Region</label>
                            <select name="Region" class="form-control">
                                <option value="0">Region 0</option>
                                <option value="1">Region 1</option>
                            </select>
                        </div>
                    </div>

                    <!-- Button (FIXED SIZE) -->
                    <div class="text-center mt-3">
                        <button type="submit" class="btn btn-dark btn-custom">
                            Predict
                        </button>
                    </div>

                </form>

                <!-- RESULT -->
                {% if results %}
                <div class="mt-4 text-center">
                    <h4 class="text-success">FWI Value: {{ results }}</h4>
                    <h5 class="text-danger">Risk Level: {{ level }}</h5>
                </div>
                {% endif %}

                <!-- ERROR -->
                {% if error %}
                <div class="mt-3 text-center">
                    <h5 class="text-danger">{{ error }}</h5>
                </div>
                {% endif %}

                <!-- BACK BUTTON -->
                <div class="text-center mt-4">
                    <a href="/" class="btn btn-outline-dark btn-custom">⬅ Back</a>
                </div>

            </div>
        </div>
    </div>
</div>

</body>
</html>
